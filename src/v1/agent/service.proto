syntax = "proto3";

package v1.agent;

service AgentService {
  rpc Register (ConnectRequest) returns (ConnectResponse);
  rpc StreamEvents (EventStreamRequest) returns (stream Event);
}

message ConnectRequest {
  string agent_id = 1;
  string version = 2;
  SchemaMode mode = 3;
}

enum SchemaMode {
  // Discovery Mode: Uses DB introspection. READ-ONLY.
  // Agents can query legacy data but cannot modify schema or data.
  DATA_FIRST = 0;

  // App Extension Mode: Only allows access to explicit registered models. READ-WRITE.
  // ROAM trusts code-defined validation rules to allow mutations.
  CODE_FIRST = 1;

  // Mixed Mode: Uses registered models for known tables, falls back to introspection. READ-ONLY.
  // Defaults to safety (Read Only) due to the presence of unvalidated legacy data.
  HYBRID = 2;
}

message ConnectResponse {
  bool success = 1;
  string session_id = 2;
}

message EventStreamRequest {
  string session_id = 1;
}

message Event {
  string type = 1;
  bytes payload = 2;
  oneof typed_payload {
    SchemaChangedPayload schema_changed = 3;
    SchemaIntrospectedPayload schema_introspected = 4;
    AgentRegisteredPayload agent_registered = 5;
    AgentHeartbeatPayload agent_heartbeat = 6;
    QueryExecutedPayload query_executed = 7;
    EntityResolvedPayload entity_resolved = 8;
    ValidationFailedPayload validation_failed = 9;
    TriggerFiredPayload trigger_fired = 10;
    ErrorPayload error = 11;
    CustomPayload custom = 12;
  }
}

message SchemaChangedPayload {
  string schema_id = 1;
  string database_type = 2;
}

message SchemaIntrospectedPayload {
  string schema_id = 1;
  string database_type = 2;
}

message AgentRegisteredPayload {
  string agent_id = 1;
  string session_id = 2;
  string version = 3;
}

message AgentHeartbeatPayload {
  string agent_id = 1;
  string timestamp = 2;
}

message QueryExecutedPayload {
  string query = 1;
  int64 row_count = 2;
  double duration_ms = 3;
}

message EntityResolvedPayload {
  string table_name = 1;
  string entity_type = 2;
}

message ValidationFailedPayload {
  string table_name = 1;
  string field_name = 2;
  string reason = 3;
}

message TriggerFiredPayload {
  string table_name = 1;
  string trigger_name = 2;
  string operation = 3;
  string row_id = 4;
  string timestamp = 5;
}

message ErrorPayload {
  string message = 1;
  string source = 2;
}

message CustomPayload {
  string name = 1;
  bytes data = 2;
}
